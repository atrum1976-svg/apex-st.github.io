<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OUT — THE PROJECT</title>
    <style>
        /* Аскетичный дизайн в стиле APEX STUDIO */
        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            background-color: #000;
            color: #fff;
            font-family: 'Inter', -apple-system, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-align: center;
        }

        /* Контейнер для логотипа */
        .logo-container {
            margin-bottom: 40px;
        }

        .logo-container img {
            width: 300px; /* Отрегулируй под свой SVG */
            height: auto;
        }

        .status-text {
            font-size: 18px;
            letter-spacing: 4px;
            text-transform: uppercase;
            margin-bottom: 30px;
            color: #fff;
            font-weight: 300;
        }

        /* Таймер */
        #timer {
            display: flex;
            gap: 40px;
            font-size: 54px;
            font-weight: 200;
            margin-bottom: 60px;
        }

        .timer-segment {
            display: flex;
            flex-direction: column;
        }

        .label {
            font-size: 10px;
            text-transform: uppercase;
            letter-spacing: 2px;
            color: #555;
            margin-top: 8px;
        }

        /* Секция подробностей */
        .details-wrapper {
            max-width: 600px;
            border-top: 1px solid #222;
            padding-top: 40px;
        }

        .details-title {
            font-size: 16px;
            text-transform: uppercase;
            letter-spacing: 3px;
            margin-bottom: 25px;
            cursor: pointer;
            color: #888;
            transition: color 0.3s;
        }

        .details-title:hover {
            color: #fff;
        }

        #info {
            display: none; /* Скрыто до клика */
            font-size: 14px;
            line-height: 1.8;
            color: #aaa;
            text-align: center;
        }

        .highlight {
            color: #fff;
            text-transform: uppercase;
            font-weight: bold;
        }

        .final-call {
            margin-top: 30px;
            font-size: 16px;
            letter-spacing: 2px;
            color: #fff;
        }
    </style>
</head>
<body>

    <div class="logo-container">
        <!-- Твой главный логотип -->
        <img src="OUT.svg" alt="OUT LOGO">
    </div>

    <div class="status-text">Игра скоро начнется</div>

    <div id="timer">
        <div class="timer-segment"><span id="days">00</span><span class="label">Days</span></div>
        <div class="timer-segment"><span id="hours">00</span><span class="label">Hours</span></div>
        <div class="timer-segment"><span id="minutes">00</span><span class="label">Minutes</span></div>
        <div class="timer-segment"><span id="seconds">00</span><span class="label">Seconds</span></div>
    </div>

    <div class="details-wrapper">
        <div class="details-title" onclick="toggleDetails()">Подробнее [+]</div>
        
        <div id="info">
            <p>Это мобильная игра с ограниченным количеством игроков.<br>
            В течение месяца игроки будут соревноваться между собой.<br>
            <span class="highlight">Одна ошибка и вылетел навсегда.</span></p>
            
            <div class="final-call">
                Ждите анонса и удачи вам.
            </div>
        </div>
    </div>

    <script>
        // Установка таймера на 1 месяц от текущего момента
        const targetDate = new Date();
        targetDate.setMonth(targetDate.getMonth() + 1);

        function updateTimer() {
            const now = new Date().getTime();
            const diff = targetDate - now;

            if (diff <= 0) {
                document.getElementById("timer").innerHTML = "START";
                return;
            }

            const d = Math.floor(diff / (1000 * 60 * 60 * 24));
            const h = Math.floor((diff % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
            const m = Math.floor((diff % (1000 * 60 * 60)) / (1000 * 60));
            const s = Math.floor((diff % (1000 * 60)) / 1000);

            document.getElementById("days").innerText = d.toString().padStart(2, '0');
            document.getElementById("hours").innerText = h.toString().padStart(2, '0');
            document.getElementById("minutes").innerText = m.toString().padStart(2, '0');
            document.getElementById("seconds").innerText = s.toString().padStart(2, '0');
        }

        setInterval(updateTimer, 1000);
        updateTimer();

        function toggleDetails() {
            const info = document.getElementById("info");
            if (info.style.display === "block") {
                info.style.display = "none";
            } else {
                info.style.display = "block";
            }
        }
    </script>
</body>
</html>
