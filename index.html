<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OUT — THE PROJECT</title>
    <style>
        /* Аскетичный дизайн в стиле APEX STUDIO */
        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            background-color: #000;
            color: #fff;
            font-family: 'Inter', -apple-system, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-align: center;
        }

        /* Контейнер для логотипа */
        .logo-box {
            margin-bottom: 10px;
        }

        .logo-box img {
            width: 250px; /* Отрегулируй под свой SVG */
            height: auto;
            display: block;
            margin: 0 auto;
        }

        /* Текстовое название под логотипом (в твоем стиле) */
        .logo-text {
            font-size: 42px;
            font-weight: 900;
            letter-spacing: 20px;
            text-transform: uppercase;
            margin-top: -10px;
            margin-bottom: 30px;
            padding-left: 20px; /* Компенсация трекинга для центровки */
        }

        .status-tag {
            font-size: 12px;
            letter-spacing: 5px;
            text-transform: uppercase;
            color: #444;
            margin-bottom: 40px;
        }

        /* Таймер */
        #timer {
            display: flex;
            gap: 30px;
            font-size: 48px;
            font-weight: 200;
            margin-bottom: 70px;
        }

        .timer-segment {
            display: flex;
            flex-direction: column;
        }

        .label {
            font-size: 9px;
            text-transform: uppercase;
            letter-spacing: 2px;
            color: #333;
            margin-top: 5px;
        }

        /* Секция подробностей */
        .details-wrapper {
            max-width: 550px;
            border-top: 1px solid #1a1a1a;
            padding-top: 30px;
        }

        .details-title {
            font-size: 13px;
            text-transform: uppercase;
            letter-spacing: 3px;
            margin-bottom: 25px;
            cursor: pointer;
            color: #666;
            transition: color 0.3s;
        }

        .details-title:hover {
            color: #fff;
        }

        #info {
            display: none; /* Скрыто до клика */
            font-size: 15px;
            line-height: 1.7;
            color: #888;
            text-align: center;
        }

        .punchline {
            color: #fff;
            font-weight: bold;
            text-transform: uppercase;
            display: block;
            margin: 20px 0;
            letter-spacing: 1px;
        }

        .final-call {
            margin-top: 30px;
            font-size: 16px;
            letter-spacing: 1px;
            color: #fff;
        }
    </style>
</head>
<body>

    <div class="logo-box">
        <!-- Твой главный логотип (SVG) -->
        <img src="OUT.svg" alt="">
    </div>
    <!-- Текстовый акцент под логотипом -->
    <div class="logo-text">OUT</div>

    <div class="status-tag">Инициализация протокола</div>

    <div id="timer">
        <div class="timer-segment"><span id="days">00</span><span class="label">Days</span></div>
        <div class="timer-segment"><span id="hours">00</span><span class="label">Hours</span></div>
        <div class="timer-segment"><span id="minutes">00</span><span class="label">Minutes</span></div>
        <div class="timer-segment"><span id="seconds">00</span><span class="label">Seconds</span></div>
    </div>

    <div class="details-wrapper">
        <div class="details-title" onclick="toggleDetails()">Подробнее [+]</div>
        
        <div id="info">
            <p>Это мобильная игра с ограниченным числом мест.<br>
            В течение месяца — борьба за выживание в системе.<br>
            <span class="punchline">Одна ошибка — вне игры. Навсегда.</span></p>
            
            <div class="final-call">
                Ждите анонса и удачи вам.
            </div>
        </div>
    </div>

    <script>
        // Установка фиксированной даты: 1 июня 2026 года, 00:00:00
        const targetDate = new Date("June 1, 2026 00:00:00").getTime();

        function updateTimer() {
            const now = new Date().getTime();
            const diff = targetDate - now;

            // Если время вышло
            if (diff <= 0) {
                document.getElementById("timer").innerHTML = "<div style='font-size:40px; letter-spacing:10px;'>СИСТЕМА АКТИВИРОВАНА</div>";
                return;
            }

            const d = Math.floor(diff / (1000 * 60 * 60 * 24));
            const h = Math.floor((diff % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
            const m = Math.floor((diff % (1000 * 60 * 60)) / (1000 * 60));
            const s = Math.floor((diff % (1000 * 60)) / 1000);

            // Добавляем ведущий ноль, если число меньше 10
            document.getElementById("days").innerText = d.toString().padStart(2, '0');
            document.getElementById("hours").innerText = h.toString().padStart(2, '0');
            document.getElementById("minutes").innerText = m.toString().padStart(2, '0');
            document.getElementById("seconds").innerText = s.toString().padStart(2, '0');
        }

        // Обновляем таймер каждую секунду
        setInterval(updateTimer, 1000);
        
        // Запускаем сразу, чтобы не ждать секунду до первого обновления
        updateTimer();

        function toggleDetails() {
            const info = document.getElementById("info");
            if (info.style.display === "block") {
                info.style.display = "none";
            } else {
                info.style.display = "block";
            }
        }
    </script>
</body>
</html>
