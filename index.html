<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>APEX STUDIO</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        body {
            margin: 0;
            padding: 0;
            font-family: 'Inter', sans-serif;
            color: #000;
            background-color: #fff;
            overflow-x: hidden;
        }

        /* Настройка динамического фона */
        #particles-js {
            position: fixed;
            width: 100%;
            height: 100%;
            top: 0;
            left: 0;
            z-index: -1; /* Частицы строго под текстом */
            background-color: #ffffff;
        }

        header {
            padding: 30px 50px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .logo {
            display: flex;
            align-items: center;
            gap: 15px;
            font-weight: 800;
            font-size: 24px;
            letter-spacing: 2px;
        }

        .logo img {
            width: 50px;
            height: 50px;
        }

        .hero {
            height: 70vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
        }

        .hero h1 {
            font-size: 72px;
            margin: 0;
            text-transform: uppercase;
            letter-spacing: 5px;
        }

        .hero p {
            font-size: 18px;
            color: #666;
            margin-top: 10px;
        }

        .cta-button {
            margin-top: 30px;
            padding: 15px 40px;
            background: #000;
            color: #fff;
            text-decoration: none;
            border-radius: 50px;
            font-weight: 600;
            transition: 0.3s;
        }

        .cta-button:hover {
            transform: scale(1.05);
            background: #333;
        }

        footer {
            position: absolute;
            bottom: 30px;
            width: 100%;
            text-align: center;
        }

        .social-links {
            display: flex;
            justify-content: center;
            gap: 20px;
            font-size: 24px;
        }

        .social-links a {
            color: #000;
            transition: 0.3s;
        }

        .social-links a:hover {
            opacity: 0.5;
        }
    </style>
</head>
<body>

    <div id="particles-js"></div>

    <header>
        <div class="logo">
            <img src="logo.png" alt="APEX">
            <span>APEX STUDIO</span>
        </div>
    </header>

    <section class="hero">
        <h1>APEX STUDIO</h1>
        <p>Дизайн. Реставрация. Академическая помощь.</p>
        <a href="https://t.me/APEXSTUDIO1" class="cta-button">Связаться</a>
    </section>

    <footer>
        <div class="social-links">
            <a href="https://t.me/APEXSTUDIO1"><i class="fab fa-telegram"></i></a>
            <a href="https://vk.com/apex_st"><i class="fab fa-vk"></i></a>
        </div>
    </footer>

    <script src="https://cdn.jsdelivr.net/particles.js/2.0.0/particles.min.js"></script>
    <script>
        particlesJS("particles-js", {
            "particles": {
                "number": { "value": 100, "density": { "enable": true, "value_area": 800 } },
                "color": { "value": "#000000" },
                "shape": { "type": "circle" },
                "opacity": { "value": 0.2, "random": false },
                "size": { "value": 3, "random": true },
                "line_linked": {
                    "enable": true,
                    "distance": 150,
                    "color": "#000000",
                    "opacity": 0.15,
                    "width": 1
                },
                "move": {
                    "enable": true,
                    "speed": 1.5,
                    "direction": "none",
                    "random": false,
                    "straight": false,
                    "out_mode": "out",
                    "bounce": false
                }
            },
            "interactivity": {
                "detect_on": "canvas",
                "events": {
                    "onhover": { "enable": true, "mode": "grab" },
                    "onclick": { "enable": true, "mode": "push" },
                    "resize": true
                },
                "modes": {
                    "grab": { "distance": 200, "line_linked": { "opacity": 0.4 } }
                }
            },
            "retina_detect": true
        });
    </script>
</body>
</html>
