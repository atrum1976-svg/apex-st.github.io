<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>APEX STUDIO | Дизайн и Академическая помощь</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        /* Базовые стили */
        body {
            margin: 0;
            padding: 0;
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            color: #000;
            background-color: #fff;
            overflow-x: hidden;
        }

        /* Контейнер для частиц */
        #particles-js {
            position: fixed;
            width: 100%;
            height: 100%;
            top: 0;
            left: 0;
            z-index: -1;
            background-color: #ffffff;
        }

        header {
            padding: 20px 50px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: rgba(255, 255, 255, 0.8);
            backdrop-filter: blur(10px);
            position: sticky;
            top: 0;
            z-index: 100;
        }

        .logo {
            display: flex;
            align-items: center;
            gap: 15px;
            font-weight: 800;
            font-size: 24px;
            letter-spacing: 2px;
        }

        .logo img {
            width: 40px;
            height: 40px;
        }

        .nav-links a {
            text-decoration: none;
            color: #000;
            margin-left: 20px;
            font-weight: 500;
            transition: 0.3s;
        }

        .nav-links a:hover { opacity: 0.6; }

        /* Секция Hero */
        .hero {
            height: 80vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            padding: 0 20px;
        }

        .hero h1 {
            font-size: 64px;
            margin-bottom: 10px;
            text-transform: uppercase;
        }

        .hero p {
            font-size: 20px;
            max-width: 600px;
            color: #555;
        }

        /* Секция До/После */
        .comparison-section {
            padding: 80px 20px;
            text-align: center;
        }

        .comparison-container {
            position: relative;
            width: 100%;
            max-width: 800px;
            height: 500px;
            margin: 40px auto;
            overflow: hidden;
            border-radius: 12px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.1);
            border: 1px solid #eee;
        }

        .img {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-size: cover;
            background-position: center;
        }

        .foreground-img {
            width: 50%;
            border-right: 3px solid #fff;
            z-index: 2;
        }

        .slider {
            position: absolute;
            -webkit-appearance: none;
            appearance: none;
            width: 100%;
            height: 100%;
            background: transparent;
            outline: none;
            margin: 0;
            z-index: 10;
            cursor: ew-resize;
        }

        .slider::-webkit-slider-thumb {
            -webkit-appearance: none;
            width: 4px;
            height: 500px;
            background: #fff;
        }

        /* Кнопки */
        .cta-button {
            display: inline-block;
            padding: 15px 40px;
            background: #000;
            color: #fff;
            text-decoration: none;
            border-radius: 50px;
            font-weight: 600;
            margin-top: 30px;
            transition: 0.3s;
        }

        .cta-button:hover {
            transform: translateY(-3px);
            box-shadow: 0 10px 20px rgba(0,0,0,0.2);
        }

        footer {
            padding: 50px;
            text-align: center;
            border-top: 1px solid #eee;
            margin-top: 100px;
        }

        .social-icons {
            font-size: 24px;
            display: flex;
            justify-content: center;
            gap: 25px;
            margin-top: 20px;
        }

        .social-icons a { color: #000; transition: 0.3s; }
        .social-icons a:hover { transform: scale(1.2); }

        @media (max-width: 768px) {
            .hero h1 { font-size: 40px; }
            .comparison-container { height: 300px; }
        }
    </style>
</head>
<body>

    <div id="particles-js"></div>

    <header>
        <div class="logo">
            <img src="logo.png" alt="APEX">
            <span>APEX STUDIO</span>
        </div>
        <nav class="nav-links">
            <a href="#portfolio">Кейсы</a>
            <a href="https://t.me/APEXSTUDIO1">Контакт</a>
        </nav>
    </header>

    <section class="hero">
        <h1>Level Up Your Project</h1>
        <p>Профессиональный дизайн и экспертная помощь в обучении. Мы создаем вершину качества для ваших задач.</p>
        <a href="https://t.me/APEXSTUDIO1" class="cta-button">Начать проект</a>
    </section>

    <section id="portfolio" class="comparison-section">
        <h2>Реставрация и Ретушь</h2>
        <p>Двигайте ползунок, чтобы увидеть результат нашей работы</p>
        
        <div class="comparison-container">
            <div class="img background-img" style="background-image: url('photo-after.jpg');"></div>
            <div class="img foreground-img" style="background-image: url('photo-before.jpg');"></div>
            <input type="range" min="1" max="100" value="50" class="slider" id="compare-slider">
        </div>
    </section>

    <footer>
        <p>&copy; 2026 APEX STUDIO. Кулаков Роман.</p>
        <div class="social-icons">
            <a href="https://t.me/APEXSTUDIO1"><i class="fab fa-telegram"></i></a>
            <a href="https://vk.com/apex_st"><i class="fab fa-vk"></i></a>
        </div>
        <p style="margin-top: 15px; font-size: 14px; opacity: 0.5;">apex-st.ru</p>
    </footer>

    <script src="https://cdn.jsdelivr.net/particles.js/2.0.0/particles.min.js"></script>
    <script>
        /* Инициализация частиц */
        particlesJS("particles-js", {
            "particles": {
                "number": { "value": 80, "density": { "enable": true, "value_area": 800 } },
                "color": { "value": "#000000" },
                "shape": { "type": "circle" },
                "opacity": { "value": 0.2, "random": false },
                "size": { "value": 3, "random": true },
                "line_linked": { "enable": true, "distance": 150, "color": "#000000", "opacity": 0.2, "width": 1 },
                "move": { "enable": true, "speed": 2, "direction": "none", "random": false, "straight": false, "out_mode": "out", "bounce": false }
            },
            "interactivity": {
                "detect_on": "canvas",
                "events": {
                    "onhover": { "enable": true, "mode": "grab" },
                    "onclick": { "enable": true, "mode": "push" },
                    "resize": true
                },
                "modes": {
                    "grab": { "distance": 200, "line_linked": { "opacity": 0.5 } }
                }
            },
            "retina_detect": true
        });

        /* Логика ползунка До/После */
        const slider = document.getElementById('compare-slider');
        const foregroundImg = document.querySelector('.foreground-img');

        slider.addEventListener('input', (e) => {
            const sliderValue = e.target.value;
            foregroundImg.style.width = `${sliderValue}%`;
        });
    </script>
</body>
</html>
