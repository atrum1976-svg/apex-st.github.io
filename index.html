<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OUT — PROJECT</title>
    <style>
        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            background-color: #000;
            color: #fff;
            font-family: 'Inter', sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-align: center;
        }

        .logo-box {
            margin-bottom: 10px;
        }

        .logo-box img {
            width: 250px;
            height: auto;
            display: block;
            margin: 0 auto;
        }

        /* Текстовое название под логотипом */
        .logo-text {
            font-size: 42px;
            font-weight: 900;
            letter-spacing: 20px;
            text-transform: uppercase;
            margin-top: -10px;
            margin-bottom: 30px;
            padding-left: 20px; /* Компенсация трекинга для центровки */
        }

        .status-tag {
            font-size: 12px;
            letter-spacing: 5px;
            text-transform: uppercase;
            color: #444;
            margin-bottom: 40px;
        }

        #timer {
            display: flex;
            gap: 30px;
            font-size: 48px;
            font-weight: 200;
            margin-bottom: 70px;
        }

        .t-item { display: flex; flex-direction: column; }
        .t-label { font-size: 9px; text-transform: uppercase; color: #333; margin-top: 5px; letter-spacing: 2px; }

        .details-container {
            max-width: 550px;
            border-top: 1px solid #1a1a1a;
            padding-top: 30px;
        }

        .trigger {
            font-size: 13px;
            letter-spacing: 3px;
            text-transform: uppercase;
            cursor: pointer;
            color: #666;
            transition: 0.3s;
        }

        .trigger:hover { color: #fff; }

        #description {
            display: none;
            margin-top: 30px;
            font-size: 15px;
            line-height: 1.7;
            color: #888;
        }

        .punchline {
            color: #fff;
            font-weight: bold;
            text-transform: uppercase;
            display: block;
            margin: 20px 0;
            letter-spacing: 1px;
        }

        .luck {
            font-size: 16px;
            color: #fff;
            margin-top: 30px;
            letter-spacing: 1px;
        }
    </style>
</head>
<body>

    <div class="logo-box">
        <img src="OUT.svg" alt="">
    </div>
    <div class="logo-text">OUT</div>

    <div class="status-tag">Протокол инициализирован</div>

    <div id="timer">
        <div class="t-item"><span id="days">00</span><span class="t-label">Days</span></div>
        <div class="t-item"><span id="hours">00</span><span class="t-label">Hours</span></div>
        <div class="t-item"><span id="minutes">00</span><span class="t-label">Minutes</span></div>
        <div class="t-item"><span id="seconds">00</span><span class="t-label">Seconds</span></div>
    </div>

    <div class="details-container">
        <div class="trigger" onclick="showInfo()">Развернуть данные [+]</div>
        
        <div id="description">
            Это мобильная игра с ограниченным числом мест. <br>
            В течение месяца — борьба за выживание в системе. <br>
            <span class="punchline">Одна ошибка — вне игры. Навсегда.</span>
            
            <div class="luck">
                Ждите анонса и удачи вам.
            </div>
        </div>
    </div>

    <script>
        // ФИКСИРОВАННАЯ ДАТА: 5 июня 2026
        const targetDate = new Date("June 5, 2026 00:00:00").getTime();

        function countdown() {
            const now = new Date().getTime();
            const gap = targetDate - now;

            if (gap <= 0) {
                document.body.innerHTML = "<div style='font-size:50px; letter-spacing:10px;'>СИСТЕМА АКТИВИРОВАНА</div>";
                return;
            }

            const d = Math.floor(gap / (1000 * 60 * 60 * 24));
            const h = Math.floor((gap % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
            const m = Math.floor((gap % (1000 * 60 * 60)) / (1000 * 60));
            const s = Math.floor((gap % (1000 * 60)) / 1000);

            document.getElementById("days").innerText = d.toString().padStart(2, '0');
            document.getElementById("hours").innerText = h.toString().padStart(2, '0');
            document.getElementById("minutes").innerText = m.toString().padStart(2, '0');
            document.getElementById("seconds").innerText = s.toString().padStart(2, '0');
        }

        setInterval(countdown, 1000);
        countdown();

        function showInfo() {
            const desc = document.getElementById("description");
            desc.style.display = (desc.style.display === "block") ? "none" : "block";
        }
    </script>
</body>
</html>
